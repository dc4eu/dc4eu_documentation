name: Lint changed Markdown

on:
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Get changed Markdown files
        id: diff
        run: |
          # Compare the pull request HEAD with the base branch
          git fetch --depth=1 origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only HEAD origin/${{ github.base_ref }} -- '*.md')
          
          # Save the file list for use in the next step
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Lint changed files only
        run: |
          # If there are no changed Markdown files, skip.
          if [ -z "${{ steps.diff.outputs.files }}" ]; then
            echo "No changed Markdown files."
            exit 0
          fi

          # Install markdownlint-cli2
          npm install -g markdownlint-cli2

          # Lint each changed file
          IFS=$'\n'
          for file in ${{ steps.diff.outputs.files }}
          do
            echo "Linting $file..."
            markdownlint-cli2 "$file"
          done
          unset IFS